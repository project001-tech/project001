<script>

/*====================================

SESSION

====================================*/

let peserta=null;

let eventId=null;

let progressData=[];

let tahapanData=[];

/*====================================

CEK LOGIN

====================================*/

function cekLogin(){

const s=localStorage.getItem("rfs_user");

if(!s){

location.href="login_peserta.html";

return;

}

peserta=JSON.parse(s);

document.getElementById("namaPeserta").innerHTML=peserta.nama;

document.getElementById("infoNama").innerHTML=peserta.nama;

eventId=peserta.event_id;

}

/*====================================

LOGOUT

====================================*/

function logout(){

localStorage.removeItem("rfs_user");

location.href="login_peserta.html";

}

/*====================================

LOAD EVENT

====================================*/

async function loadEvent(){

const {data,error}=await db

.from("events")

.select("*")

.eq("id",eventId)

.single();

if(error){

alert(error.message);

return;

}

document.getElementById("infoEvent").innerHTML=

data.nama_event;

loadTahapan();

}

/*====================================

LOAD TAHAPAN EVENT

====================================*/

async function loadTahapan(){

const {data,error}=await db

.from("event_tests")

.select(`
*,
tests(
id,
nama_test
)
`)

.eq("event_id",eventId)

.order("urutan");

if(error){

alert(error.message);

return;

}

tahapanData=data||[];

loadProgress();

}

/*====================================

LOAD PROGRESS

====================================*/

async function loadProgress(){

const {data,error}=await db

.from("progress")

.select("*")

.eq("participant_id",peserta.id)

.eq("event_id",eventId);

if(error){

alert(error.message);

return;

}

progressData=data||[];

renderTahapan();

}

/*====================================

RENDER TABEL

====================================*/

function renderTahapan(){

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

let selesai=0;

tahapanData.forEach((row,index)=>{

const p=progressData.find(x=>x.test_id==row.test_id);

let status="BELUM";

let warna="statusBelum";

let tombolDownload=
"<button class='btn btnDownload'>Download</button>";

let tombolUpload=
"<button class='btn btnDisable'>Upload</button>";

if(p){

status=p.status||"BELUM";

if(status=="DOWNLOADED"){

warna="statusDownload";

tombolDownload=

`<button
class="btn btnDownload"
onclick="downloadSoal('${row.id}')">

Download Lagi

</button>`;

tombolUpload=

`<button
class="btn btnUpload"
onclick="uploadJawaban('${row.id}')">

Upload

</button>`;

}

if(status=="UPLOADED"){

warna="statusUpload";

tombolDownload=

`<button
class="btn btnDownload"
onclick="downloadSoal('${row.id}')">

Download

</button>`;

tombolUpload=

`<button
class="btn btnUpload"
onclick="uploadJawaban('${row.id}')">

Upload Lagi

</button>`;

selesai++;

}

}else{

tombolDownload=

`<button
class="btn btnDownload"
onclick="downloadSoal('${row.id}')">

Download

</button>`;

}

tbody.innerHTML+=`

<tr>

<td>

${index+1}

</td>

<td>

${row.tests.nama_test}

</td>

<td>

<span class="${warna}">

${status}

</span>

</td>

<td>

${tombolDownload}

</td>

<td>

${tombolUpload}

</td>

</tr>

`;

});

document.getElementById("infoTotal").innerHTML=

tahapanData.length;

let persen=0;

if(tahapanData.length>0){

persen=Math.round(

(selesai/tahapanData.length)*100

);

}

document.getElementById("infoProgress").innerHTML=

persen+"%";

}

/*====================================

DOWNLOAD

sementara

====================================*/

async function downloadSoal(eventTestId){

// ambil data tahapan

const {data,error}=await db

.from("event_tests")

.select("*")

.eq("id",eventTestId)

.single();

if(error){

    alert(error.message);

    return;

}

// belum upload soal

if(!data.soal_file){

    alert("Soal belum tersedia.");

    return;

}

// ambil public url

const {data:urlData}=db.storage

.from("recruitment-files")

.getPublicUrl(data.soal_file);

// buka file

window.open(urlData.publicUrl,"_blank");

// update progress

const p=progressData.find(x=>x.test_id==data.test_id);

if(p){

await db

.from("progress")

.update({

status:"DOWNLOADED",

download_count:(p.download_count||0)+1,

download_first:p.download_first || new Date(),

download_last:new Date()

})

.eq("id",p.id);

}

loadProgress();

}

/*====================================

UPLOAD

sementara

====================================*/

function uploadJawaban(id){

alert("Upload jawaban : "+id);

}

/*====================================

START

====================================*/

cekLogin();

loadEvent();


</script>
