<script>

/*====================================

SESSION

====================================*/

let peserta=null;

let eventId=null;

let progressData=[];

let tahapanData=[];

let progressUploadId=null;

/*====================================

CEK LOGIN

====================================*/

function cekLogin(){

const s=localStorage.getItem("rfs_user");

if(!s){

location.href="login_peserta.html";

return;

}

peserta=JSON.parse(s);

document.getElementById("namaPeserta").innerHTML=peserta.nama;

document.getElementById("infoNama").innerHTML=peserta.nama;

eventId=peserta.event_id;

}

/*====================================

LOGOUT

====================================*/

function logout(){

localStorage.removeItem("rfs_user");

location.href="login_peserta.html";

}

/*====================================

LOAD EVENT

====================================*/

async function loadEvent(){

const {data,error}=await db

.from("events")

.select("*")

.eq("id",eventId)

.single();

if(error){

alert(error.message);

return;

}

document.getElementById("infoEvent").innerHTML=

data.nama_event;

loadTahapan();

}

/*====================================

LOAD TAHAPAN EVENT

====================================*/

async function loadTahapan(){

const {data,error}=await db

.from("event_tests")

.select(`
*,
tests(
id,
nama_test
)
`)

.eq("event_id",eventId)

.order("urutan");

if(error){

alert(error.message);

return;

}

tahapanData=data||[];

loadProgress();

}

/*====================================

LOAD PROGRESS

====================================*/

async function loadProgress(){

const {data,error}=await db

.from("progress")

.select(`
    *,
    tests(
        id,
        nama_test
    ),
    event_tests(
        id,
        soal_file,
        petunjuk,
        buka_download,
        tutup_download,
        buka_upload,
        tutup_upload
    )
`)
.eq("participant_id",peserta.id)
.eq("event_id",eventId);

if(error){

    alert(error.message);

    return;

}

progressData=data||[];

renderTahapan();

}

/*====================================

RENDER TABEL

====================================*/

function renderTahapan(){

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

let selesai=0;

progressData.forEach((r,index)=>{

const et=r.event_tests;

let status=r.status||"BELUM";

let warna="statusBelum";

if(status=="DOWNLOADED") warna="statusDownload";

if(status=="UPLOADED"){

    warna="statusUpload";

    selesai++;

}

const sekarang=new Date();

let btnDownload="";

if(status=="UPLOADED"){

btnUpload=

`<button

class="btn btnUpload"

onclick="uploadJawaban('${r.id}')">

Upload Lagi

</button>`;

}else{

btnUpload=

`<button

class="btn btnUpload"

onclick="uploadJawaban('${r.id}')">

Upload

</button>`;

}

let downloadBoleh=false;

let uploadBoleh=false;

/* ===========================
DOWNLOAD
=========================== */

if(et && et.buka_download && et.tutup_download){

    if(

        sekarang>=new Date(et.buka_download)

        &&

        sekarang<=new Date(et.tutup_download)

    ){

        downloadBoleh=true;

    }

}

/* ===========================
UPLOAD
=========================== */

if(et && et.buka_upload && et.tutup_upload){

    if(

        sekarang>=new Date(et.buka_upload)

        &&

        sekarang<=new Date(et.tutup_upload)

    ){

        uploadBoleh=true;

    }

}

if(downloadBoleh){

btnDownload=

`<button

class="btn btnDownload"

onclick="downloadSoal('${r.id}')">

Download

</button>`;

}else{

btnDownload=

`<button

class="btn btnDisable">

Terkunci

</button>`;

}

if(uploadBoleh){

btnUpload=

`<button

class="btn btnUpload"

onclick="uploadJawaban('${r.id}')">

Upload

</button>`;

}else{

btnUpload=

`<button

class="btn btnDisable">

Belum Dibuka

</button>`;

}

tbody.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${r.tests.nama_test}</td>

<td>

<span class="${warna}">

${status}

</span>

</td>

<td>

${btnDownload}

</td>

<td>

${btnUpload}

</td>

</tr>

`;

});

document.getElementById("infoTotal").innerHTML=

progressData.length;

let persen=0;

if(progressData.length>0){

persen=Math.round(

(selesai/progressData.length)*100

);

}

document.getElementById("infoProgress").innerHTML=

persen+"%";

}
/*====================================

DOWNLOAD

sementara

====================================*/

async function downloadSoal(progressId){

const p=progressData.find(x=>x.id==progressId);

if(!p){

    return;

}

const file=p.event_tests.soal_file;

if(!file){

    alert("Soal belum tersedia.");

    return;

}

const {data:url}=db.storage

.from("recruitment-files")

.getPublicUrl(file);

window.open(url.publicUrl,"_blank");

await db

.from("progress")

.update({

status:"DOWNLOADED",

download_count:(p.download_count||0)+1,

download_first:p.download_first || new Date(),

download_last:new Date()

})

.eq("id",progressId);

loadProgress();

}

/*====================================

UPLOAD

sementara

====================================*/

function uploadJawaban(progressId){

    progressUploadId=progressId;

    document
    .getElementById("fileJawaban")
    .click();

}

async function prosesUpload(){

const file=document
.getElementById("fileJawaban")
.files[0];

if(!file){

    return;

}

const p=progressData.find(x=>x.id==progressUploadId);

if(!p){

    alert("Progress tidak ditemukan.");

    return;

}

const namaFile=

"jawaban/"

+

p.event_id

+

"/"

+

p.participant_id

+

"/"

+

p.test_id

+

"/"

+

Date.now()

+

"_"

+

file.name;

const upload=await db.storage

.from("recruitment-files")

.upload(

namaFile,

file,

{

upsert:true

}

);

if(upload.error){

    alert(upload.error.message);

    return;

}

const update=await db

.from("progress")

.update({

    jawaban_file:namaFile,

    status:"UPLOADED",

    upload_count:(p.upload_count||0)+1,

    upload_first:

        p.upload_first ||

        new Date(),

    upload_last:

        new Date()

})

.eq("id",progressUploadId);

if(update.error){

    alert(update.error.message);

    return;

}

alert("Jawaban berhasil diupload.");

loadProgress();

}

cekLogin();

loadEvent();


</script>
