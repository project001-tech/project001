<script>

let peserta = null;

let progress = [];

let eventData = null;


/*==========================================
AMBIL ID PESERTA DARI URL
==========================================*/

/*==========================================
AMBIL ID PESERTA DARI URL
==========================================*/

document.addEventListener("DOMContentLoaded",async()=>{

    const params=new URLSearchParams(window.location.search);

    const id=params.get("id");

    if(!id){

        alert("Link tidak valid");

        return;

    }

    peserta={

        id:id

    };

    await loadPeserta();

});
/*==========================================
LOAD DATA PESERTA
==========================================*/

async function loadPeserta(){

    const {data,error}=await db

    .from("participants")

    .select("*")

    .eq("id",peserta.id)

    .single();

    if(error){

        alert(error.message);

        return;

    }

    peserta=data;

    document.getElementById("namaPeserta").innerHTML=data.nama;

    document.getElementById("infoNama").innerHTML=data.nama;

    document.getElementById("infoEmail").innerHTML=data.email;

    await loadEvent();

}


/*==========================================
LOAD EVENT
==========================================*/

async function loadEvent(){

    const {data,error}=await db

    .from("events")

    .select("*")

    .eq("id",peserta.event_id)

    .single();

    if(error){

        alert(error.message);

        return;

    }

    eventData=data;

    document.getElementById("infoEvent").innerHTML=data.nama_event;

    await loadProgress();

}

  /*==========================================
LOAD PROGRESS PESERTA
==========================================*/

async function loadProgress(){

    const {data,error}=await db

    .from("progress")

    .select(`
        *,
        tests (
            id,
            nama_test,
            urutan
        )
    `)

    .eq("participant_id",peserta.id)

    .eq("event_id",eventData.id)

    .order("test_id");

    if(error){

        alert(error.message);

        return;

    }

    progress=data;

    renderProgress();

}


/*==========================================
TAMPILKAN PROGRESS
==========================================*/

function renderProgress(){

    const tbody=document.getElementById("tblProgress");

    tbody.innerHTML="";

    progress.forEach((item,index)=>{

        let tombolDownload="";
        let tombolUpload="";

       if(item.status=="TERKUNCI"){

    tombolDownload="<span class='lock'>🔒</span>";

    tombolUpload="<span class='lock'>🔒</span>";

}

tbody.innerHTML += `
<tr>
    <td>${index+1}</td>
    <td>${item.tests.nama_test}</td>
    <td>${item.status}</td>
    <td>${tombolDownload}</td>
    <td>${tombolUpload}</td>
</tr>
`;

    });

}

else if(item.status=="SELESAI"){

    tombolDownload="<span style='color:green;'>✔ Selesai</span>";

    tombolUpload="<span style='color:green;'>✔ Upload</span>";

}

else{

    tombolDownload=
    `<button
        class="download"
        onclick="downloadSoal('${item.id}')">
        Download
    </button>`;

    tombolUpload=
    `<button
        class="upload"
        onclick="uploadJawaban('${item.id}')">
        Upload
    </button>`;

}
/*==========================================
DOWNLOAD SOAL
==========================================*/

/*==========================================
TAMPILKAN PROGRESS
==========================================*/

function renderProgress(){

    const tbody = document.getElementById("tblProgress");

    tbody.innerHTML = "";

    progress.forEach((item,index)=>{

        let tombolDownload = "";
        let tombolUpload = "";

        if(item.status=="TERKUNCI"){

            tombolDownload="<span class='lock'>🔒</span>";
            tombolUpload="<span class='lock'>🔒</span>";

        }
        else if(item.status=="SELESAI"){

            tombolDownload="<span style='color:green'>✔ Selesai</span>";
            tombolUpload="<span style='color:green'>✔ Upload</span>";

        }
        else{

            tombolDownload=`
                <button
                    class="download"
                    onclick="downloadSoal('${item.id}')">
                    Download
                </button>
            `;

            tombolUpload=`
                <button
                    class="upload"
                    onclick="uploadJawaban('${item.id}')">
                    Upload
                </button>
            `;

        }

        tbody.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${item.tests.nama_test}</td>
            <td class="status">${item.status}</td>
            <td>${tombolDownload}</td>
            <td>${tombolUpload}</td>
        </tr>
        `;

    });

}
  /*==========================================
UPLOAD JAWABAN
==========================================*/

let progressUpload = null;

function uploadJawaban(progressId){

    progressUpload = progressId;

    document
    .getElementById("fileUpload")
    .click();

}

document
.getElementById("fileUpload")
.addEventListener("change",prosesUpload);

async function prosesUpload(e){

    const file = e.target.files[0];

    if(!file){

        return;

    }

    const row = progress.find(x=>x.id==progressUpload);

    const ext = file.name.split(".").pop();

    const fileName =

        peserta.id +

        "_" +

        row.tests.nama_test +

        "." +

        ext;

    const filePath =

        "jawaban/" +

        fileName;

    const {error:uploadError} =

        await db.storage

        .from("recruitment-files")

        .upload(

            filePath,

            file,

            {

                upsert:true

            }

        );

    if(uploadError){

        alert(uploadError.message);

        return;

    }

    await simpanUpload(progressUpload,filePath);

}

  async function simpanUpload(id,filePath){

    const row = progress.find(x=>x.id==id);

    const {error}=await db

    .from("progress")

    .update({

        status:"SELESAI",

        upload_at:new Date(),

        upload_count:(row.upload_count||0)+1,

        file_jawaban:filePath

    })

    .eq("id",id);

    if(error){

        alert(error.message);

        return;

    }

    await bukaTahapanBerikutnya(row);

    alert("Upload Berhasil");

    loadProgress();

}

/*==========================================
BUKA TAHAPAN BERIKUTNYA
==========================================*/

async function bukaTahapanBerikutnya(row){

    const index = progress.findIndex(x=>x.id==row.id);

    if(index==-1){

        return;

    }

    if(index>=progress.length-1){

        return;

    }

    const next = progress[index+1];

    if(next.status!="TERKUNCI"){

        return;

    }

    await db

    .from("progress")

    .update({

        status:"BELUM"

    })

    .eq("id",next.id);

}
