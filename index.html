<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruitment Flow System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

/*==================================================
ROOT
==================================================*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

/*==================================================
LOGIN
==================================================*/

#loginPage{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{

    width:380px;

    background:white;

    padding:30px;

    border-radius:12px;

    box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.login-box h2{

    margin-bottom:20px;

    text-align:center;

    color:#2563EB;

}

.login-box input{

    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:1px solid #ddd;

    border-radius:8px;

    outline:none;

}

.login-box button{

    width:100%;

    padding:12px;

    background:#2563EB;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;

}

.login-box button:hover{

    background:#1d4ed8;

}

/*==================================================
HEADER
==================================================*/

#app{

    display:none;

}

header{

    height:60px;

    background:white;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 25px;

    box-shadow:0 2px 5px rgba(0,0,0,.08);

}

header h2{

    color:#2563EB;

}

header button{

    padding:8px 15px;

    border:none;

    background:#ef4444;

    color:white;

    border-radius:6px;

    cursor:pointer;

}

/*==================================================
MENU
==================================================*/

nav{

    background:white;

    padding:15px;

    display:flex;

    gap:10px;

    border-bottom:1px solid #ddd;

}

nav button{

    padding:10px 18px;

    border:none;

    background:#e5e7eb;

    border-radius:8px;

    cursor:pointer;

}

nav button:hover{

    background:#2563EB;

    color:white;

}

/*==================================================
CONTENT
==================================================*/

.page{

    display:none;

    padding:25px;

}

.active{

    display:block;

}

/*==================================================
CARD
==================================================*/

.card{

    background:white;

    border-radius:10px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

.card h3{

    margin-bottom:15px;

}

/*==================================================
STATUS
==================================================*/

.status-belum{

    color:#dc2626;

    font-weight:bold;

}

.status-proses{

    color:#f59e0b;

    font-weight:bold;

}

.status-selesai{

    color:#16a34a;

    font-weight:bold;

}

/*==================================================
TABLE
==================================================*/

table{

    width:100%;

    border-collapse:collapse;

}

table th{

    background:#2563EB;

    color:white;

    padding:10px;

}

table td{

    padding:10px;

    border-bottom:1px solid #ddd;

}

/*==================================================
MODAL
==================================================*/

#modal{

    display:none;

    position:fixed;

    left:0;

    top:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,.4);

    justify-content:center;

    align-items:center;

}

.modal-box{

    width:600px;

    background:white;

    padding:25px;

    border-radius:10px;

}

/*==================================================
RESPONSIVE
==================================================*/

@media(max-width:768px){

nav{

    flex-wrap:wrap;

}

header{

    flex-direction:column;

    height:auto;

    padding:15px;

}

}

</style>

</head>

<body>

<!--==================================================
LOGIN
===================================================-->

<div id="loginPage">

    <div class="login-box">

        <h2>Recruitment Flow System</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="login()">

            LOGIN

        </button>

    </div>

</div>

<!--==================================================
APPLICATION
===================================================-->

<div id="app">

<header>

<h2>

Recruitment Flow System

</h2>

<div>

<span id="loginName"></span>

<button onclick="logout()">

Logout

</button>

</div>

</header>

<nav>

<button onclick="showPage('dashboard')">

Dashboard

</button>

<button onclick="showPage('recruitment')">

Recruitment

</button>

<button onclick="showPage('monitoring')">

Monitoring

</button>

<button onclick="showPage('setting')">

Setting

</button>

</nav>

<!--==================================================
DASHBOARD
===================================================-->

<div
id="dashboard"
class="page active">

<div class="card">

<h3>Dashboard</h3>

Halaman Dashboard

</div>

</div>

<!--==================================================
RECRUITMENT
===================================================-->

<div
id="recruitment"
class="page">

<div class="card">

<h3>Recruitment</h3>

Belum dibuat

</div>

</div>

<!--==================================================
MONITORING
===================================================-->

<div
id="monitoring"
class="page">

<div class="card">

<h3>Monitoring</h3>

Belum dibuat

</div>

</div>

<!--==================================================
SETTING
===================================================-->

<div id="setting" class="page">

    <div class="card">

        <h2>Setting</h2>

        <br>

        <button onclick="loadMasterStep()">
            Master Tahapan
        </button>

        <button>
            Event
        </button>

        <button>
            Peserta
        </button>

        <button>
            Admin
        </button>

        <hr style="margin:20px 0">

        <div id="settingContent">

            Silakan pilih menu.

        </div>

    </div>

</div>

<!--==================================================
MODAL
===================================================-->

<div id="modal">

<div class="modal-box">

<h3>Popup</h3>

Isi Popup

</div>

</div>

<!--==================================================
JAVASCRIPT
===================================================-->

<script>

/*==================================================
GLOBAL
==================================================*/

let currentUser = null;

/*==================================================
LOGIN
==================================================*/

async function login(){

    const email=document.getElementById("username").value.trim();

    const password=document.getElementById("password").value.trim();

    if(email=="" || password==""){

        alert("Email dan Password wajib diisi.");

        return;

    }

    // ===============================
    // LOGIN ADMIN
    // ===============================

    let {data:admin,error:errorAdmin}=await supabase

    .from("admins")

    .select("*")

    .eq("email",email)

    .eq("password",password)

    .maybeSingle();

    if(admin){

        currentUser=admin;

        currentUser.role="ADMIN";

        document.getElementById("loginName").innerHTML=admin.nama;

        document.getElementById("loginPage").style.display="none";

        document.getElementById("app").style.display="block";

        document.querySelector("nav").style.display="flex";

        showPage("dashboard");

        return;

    }

    // ===============================
    // LOGIN PESERTA
    // ===============================

    let {data:participant,error:errorParticipant}=await supabase

    .from("participants")

    .select("*")

    .eq("email",email)

    .eq("password",password)

    .maybeSingle();

    if(participant){

        currentUser=participant;

        currentUser.role="PESERTA";

        document.getElementById("loginName").innerHTML=participant.nama;

        document.getElementById("loginPage").style.display="none";

        document.getElementById("app").style.display="block";

        showParticipant();

        return;

    }

    alert("Email atau Password salah.");

}

/*==================================================
LOGOUT
==================================================*/

function logout(){

    if(confirm("Logout ?")==false){

        return;

    }

    currentUser=null;

    document.getElementById("username").value="";

    document.getElementById("password").value="";

    document.getElementById("loginPage").style.display="flex";

    document.getElementById("app").style.display="none";

}

/*==================================================
NAVIGATION
==================================================*/

function showPage(id){

    document.querySelectorAll(".page").forEach(p=>{

        p.classList.remove("active");

    });

    document.getElementById(id).classList.add("active");

}

/*==================================================
PESERTA
==================================================*/

function showParticipant(){

    document.querySelector("nav").style.display="none";

    document.getElementById("dashboard").innerHTML=`

    <div class="card">

        <h2>Selamat Datang</h2>

        <br>

        <b>${currentUser.nama}</b>

    </div>

    <div class="card">

        <h3>STEP 1</h3>

        <p>Tes Kompetensi Payroll</p>

        <br>

        <span class="status-belum">

        BELUM

        </span>

        <br><br>

        <button>

        Download Soal

        </button>

        <br><br>

        <input type="file">

        <br><br>

        <button>

        Upload Jawaban

        </button>

    </div>

    <div class="card">

        <h3>STEP 2</h3>

        🔒 Menunggu Tahapan Sebelumnya

    </div>

    `;

}

/*==================================================
MODAL
==================================================*/

function showModal(html){

    document.getElementById("modal").style.display="flex";

    document.querySelector(".modal-box").innerHTML=html;

}

/*==================================================
MASTER TAHAPAN
==================================================*/

async function loadMasterStep(){

    document.getElementById("settingContent").innerHTML="Loading...";

    const {data,error}=await supabase

    .from("tests")

    .select("*")

    .order("urutan",{ascending:true});

    if(error){

        document.getElementById("settingContent").innerHTML=

        "<font color='red'>"+error.message+"</font>";

        return;

    }

    let html="";

    html+=`
    
    <button onclick="addStep()">

        + Tambah Tahapan

    </button>

    <br><br>

    <table>

        <tr>

            <th>Urutan</th>

            <th>Nama Tahapan</th>

            <th>Jenis</th>

            <th>Status</th>

            <th>File</th>

            <th>Aksi</th>

        </tr>

    `;

    data.forEach(row=>{

        html+=`

        <tr>

            <td>${row.urutan??""}</td>

            <td>${row.nama_test??""}</td>

            <td>${row.jenis??""}</td>

            <td>${row.aktif?"Aktif":"Nonaktif"}</td>

            <td>

${row.file_soal ?? "-"}

</td>

<td>

<button onclick="editStep('${row.id}')">

Edit

</button>

</td>

        </tr>

        `;

    });

    html+=`

    </table>

    `;

    document.getElementById("settingContent").innerHTML=html;

}

function addStep(){

showModal(`

<h2>Tambah Tahapan</h2>

<br>

<label>Nama Tahapan</label>

<input
id="stepNama"
type="text"
style="width:100%;padding:10px;">

<br><br>

<label>Jenis</label>

<select
id="stepJenis"
style="width:100%;padding:10px;">

<option value="DOWNLOAD_UPLOAD">

DOWNLOAD_UPLOAD

</option>

<option value="CHECKLIST">

CHECKLIST

</option>

<option value="LINK">

LINK

</option>

</select>

<br><br>

<label>Urutan</label>

<input
id="stepUrutan"
type="number"
value="1"
style="width:100%;padding:10px;">

<br><br>

<label>Petunjuk</label>

<textarea
id="stepPetunjuk"

<br><br>

<label>File Soal</label>

<input
id="stepFile"
type="file">

<br><br>
style="width:100%;height:120px;">

</textarea>

<br><br>

<label>

<input
id="stepAktif"
type="checkbox"
checked>

Aktif

</label>

<br><br>

<button onclick="saveStep()">

Simpan

</button>

<button onclick="closeModal()">

Batal

</button>

`);

}

async function saveStep(){

const nama=document.getElementById("stepNama").value.trim();

if(nama==""){

alert("Nama Tahapan wajib diisi");

return;

}

const file=document.getElementById("stepFile").files[0];

let filePath="";

if(file){

filePath=Date.now()+"_"+file.name;

const {error:uploadError}=await supabase.storage

.from("question-files")

.upload(filePath,file);

if(uploadError){

alert(uploadError.message);

return;

}

}

const {error}=await supabase

.from("tests")

.insert({

nama_test:nama,

jenis:document.getElementById("stepJenis").value,

urutan:parseInt(document.getElementById("stepUrutan").value),

petunjuk:document.getElementById("stepPetunjuk").value,

file_soal:filePath,

aktif:document.getElementById("stepAktif").checked

});

if(error){

alert(error.message);

return;

}

closeModal();

loadMasterStep();

}

async function updateStep(id){

const {error}=await supabase

.from("tests")

.update({

nama_test:document.getElementById("editNama").value,

jenis:document.getElementById("editJenis").value,

urutan:parseInt(document.getElementById("editUrutan").value),

petunjuk:document.getElementById("editPetunjuk").value

})

.eq("id",id);

if(error){

alert(error.message);

return;

}

closeModal();

loadMasterStep();

}

async function deleteStep(id){

if(confirm("Hapus Tahapan ?")==false){

return;

}

const {error}=await supabase

.from("tests")

.delete()

.eq("id",id);

if(error){

alert(error.message);

return;

}

closeModal();

loadMasterStep();

}
async function editStep(id){

const {data,error}=await supabase

.from("tests")

.select("*")

.eq("id",id)

.single();

if(error){

alert(error.message);

return;

}

showModal(`

<h2>Edit Tahapan</h2>

<br>

<input
id="editNama"
value="${data.nama_test}"
style="width:100%;padding:10px;">

<br><br>

<select
id="editJenis"
style="width:100%;padding:10px;">

<option value="DOWNLOAD_UPLOAD">

DOWNLOAD_UPLOAD

</option>

<option value="CHECKLIST">

CHECKLIST

</option>

<option value="LINK">

LINK

</option>

</select>

<br><br>

<input
id="editUrutan"
type="number"
value="${data.urutan}"
style="width:100%;padding:10px;">

<br><br>

<textarea
id="editPetunjuk"
style="width:100%;height:120px;">

${data.petunjuk??""}

</textarea>

<br><br>

<button onclick="updateStep('${id}')">

Update

</button>

<button onclick="deleteStep('${id}')">

Hapus

</button>

`);

setTimeout(()=>{

document.getElementById("editJenis").value=data.jenis;

},100);

}

/*==================================================
INIT
==================================================*/

console.log("Recruitment Flow System Ready");

</script>

</body>

</html>
