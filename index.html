const SUPABASE_URL="https://wxmxkgmgddmfysazcirl.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bXhrZ21nZGRtZnlzYXpjaXJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjkwMTEsImV4cCI6MjA5OTUwNTAxMX0.4xqkf2H0BGW8ds3SG2VS4mzSjJiL8ZOKJw1ztGD77LU";

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#f3f5f9}
#loginPage{display:flex;height:100vh;justify-content:center;align-items:center}
.card{background:#fff;padding:25px;border-radius:10px;box-shadow:0 5px 18px rgba(0,0,0,.12)}
input,select,textarea{width:100%;padding:10px;margin:8px 0}
button{padding:10px 15px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
#app{display:none}
header{background:#2563eb;color:#fff;padding:15px;display:flex;justify-content:space-between}
.main{display:flex;height:calc(100vh - 58px)}
aside{width:220px;background:#fff;padding:12px;border-right:1px solid #ddd}
aside button{width:100%;margin-bottom:8px}
#content{flex:1;padding:20px}
.page{display:none}
.page.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center}
#modalBox{background:#fff;padding:20px;border-radius:10px;width:500px}
</style>
</head>
<body>

<div id="loginPage">
<div class="card" style="width:380px">
<h2>Recruitment Flow System</h2>
<input id="username" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()" style="width:100%">LOGIN</button>
</div>
</div>

<div id="recruitment" class="page"><div class="card">Recruitment</div></div>
<div id="monitoring" class="page"><div class="card">Monitoring</div></div>
</div>
</div>
</div>

<div id="modal">
<div id="modalBox">
<h3>Tambah Tahapan</h3>
<input id="tNama" placeholder="Nama Test">
<select id="tJenis">
<option>DOWNLOAD_UPLOAD</option>
<option>CHECKLIST</option>
<option>LINK</option>
</select>
<input id="tUrutan" type="number" value="1">
<label><input id="tAktif" type="checkbox" checked> Aktif</label><br><br>
<button onclick="saveTest()">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>
</div>

<script>
let currentUser=null;


function openApp(){
 loginPage.style.display="none";
 app.style.display="block";
 loginName.innerText=currentUser.nama||currentUser.email;
 if(currentUser.role==="PESERTA") menu.style.display="none";
}

function saveSession(){localStorage.setItem("rfs_user",JSON.stringify(currentUser));}
function restoreSession(){let s=localStorage.getItem("rfs_user");if(!s)return;currentUser=JSON.parse(s);openApp();}
function logout(){localStorage.removeItem("rfs_user");location.reload();}

async function login(){
 const email=username.value.trim();
 const password=document.getElementById("password").value.trim();

 let {data:a}=await db.from("admins").select("*").eq("email",email).eq("password",password).maybeSingle();
 if(a){a.role="ADMIN";currentUser=a;saveSession();openApp();return;}

 let {data:p}=await db.from("participants").select("*").eq("email",email).eq("password",password).maybeSingle();
 if(p){p.role="PESERTA";currentUser=p;saveSession();openApp();return;}

 alert("Email atau Password salah");
}

async function loadTests(){
 const {data,error}=await db.from("tests").select("*").order("urutan");
 if(error){alert(error.message);return;}
 tblTests.innerHTML="";
 data.forEach(r=>{
   tblTests.innerHTML+=`<tr>
   <td>${r.urutan??""}</td>
   <td>${r.nama_test??""}</td>
   <td>${r.jenis??""}</td>
   <td>${r.aktif?"Ya":"Tidak"}</td>
   </tr>`;
 });
}

function newTest(){modal.style.display="flex";}
function closeModal(){modal.style.display="none";}

async function saveTest(){
 const {error}=await db.from("tests").insert({
  nama_test:tNama.value,
  jenis:tJenis.value,
  urutan:Number(tUrutan.value),
  aktif:tAktif.checked
 });
 if(error){alert(error.message);return;}
 closeModal();
 loadTests();
}

restoreSession();
</script>

</body>
</html>
