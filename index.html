<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#f3f5f9}
#loginPage{display:flex;height:100vh;justify-content:center;align-items:center}
.card{background:#fff;padding:25px;border-radius:10px;box-shadow:0 5px 18px rgba(0,0,0,.12)}
input,select,textarea{width:100%;padding:10px;margin:8px 0}
button{padding:10px 15px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
#app{display:none}
header{background:#2563eb;color:#fff;padding:15px;display:flex;justify-content:space-between}
.main{display:flex;height:calc(100vh - 58px)}
aside{width:220px;background:#fff;padding:12px;border-right:1px solid #ddd}
aside button{width:100%;margin-bottom:8px}
#content{flex:1;padding:20px}
.page{display:none}
.page.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:8px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center}
#modalBox{background:#fff;padding:20px;border-radius:10px;width:500px}
</style>
</head>
<body>

<div id="loginPage">
<div class="card" style="width:380px">
<h2>Recruitment Flow System</h2>
<input id="username" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()" style="width:100%">LOGIN</button>
</div>
</div>

<script>
let currentUser=null;

function saveSession(){localStorage.setItem("rfs_user",JSON.stringify(currentUser));}

async function login(){
 const email=username.value.trim();
 const password=document.getElementById("password").value.trim();

 let {data:a}=await db.from("admins").select("*").eq("email",email).eq("password",password).maybeSingle();
if(a){

    a.role="ADMIN";

    currentUser=a;

    saveSession();

    location.href="dashboard.html";

    return;

}

 let {data:p}=await db.from("participants").select("*").eq("email",email).eq("password",password).maybeSingle();

 alert("Email atau Password salah");
}
restoreSession();

function restoreSession(){

    const s=localStorage.getItem("rfs_user");

    if(!s){

        return;

    }

    location.href="dashboard.html";

}
</script>

</body>
</html>
