<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Dashboard Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f5f7fb;
}

header{

height:70px;

background:#2563eb;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 25px;

}

header h2{

font-size:22px;

}

.logout{

background:#ef4444;

padding:10px 18px;

border-radius:6px;

cursor:pointer;

}

.container{

display:flex;

height:calc(100vh - 70px);

}

.sidebar{

width:250px;

background:white;

border-right:1px solid #ddd;

padding:20px;

}

.sidebar button{

width:100%;

margin-bottom:12px;

padding:14px;

border:none;

border-radius:8px;

background:#2563eb;

color:white;

font-size:15px;

cursor:pointer;

}

.content{

flex:1;

padding:30px;

}

.card{

background:white;

border-radius:12px;

padding:30px;

box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.card h1{

margin-bottom:10px;

}

.menuGrid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:30px;

}

.menu{

background:white;

border-radius:12px;

padding:30px;

text-align:center;

box-shadow:0 3px 10px rgba(0,0,0,.08);

cursor:pointer;

transition:.2s;

}

.menu:hover{

transform:translateY(-5px);

}

.menu h3{

margin-top:15px;

}

</style>

</head>

<body>

<header>

<h2>

Recruitment Flow System

</h2>

<div
class="logout"
onclick="logout()">

Logout

</div>

</header>

<div class="container">

<div class="sidebar">

<button onclick="location.href='master_tahapan.html'">

📋 Master Tahapan

</button>

<button onclick="location.href='master_event.html'">

📅 Master Event

</button>

<button onclick="location.href='master_peserta.html'">

👥 Master Peserta

<button onclick="location.href='event_peserta.html'">

🔗 Event Peserta

</button>

<button onclick="location.href='monitoring.html'">

📈 Monitoring

</button>

<button onclick="location.href='report.html'">

📄 Report

</button>

</div>

<div class="content">

<div class="card">

<h1>

Selamat Datang Administrator

</h1>

<p>

Silakan pilih menu di sebelah kiri.

</p>

</div>

<div class="menuGrid">

    <div class="menu" onclick="location.href='master_tahapan.html'">
        📋
        <h3>Master Tahapan</h3>
    </div>

    <div class="menu" onclick="location.href='master_event.html'">
        📅
        <h3>Master Event</h3>
    </div>

    <div class="menu" onclick="location.href='master_peserta.html'">
        👥
        <h3>Master Peserta</h3>
    </div>

    <div class="menu" onclick="location.href='event_peserta.html'">
        🔗
        <h3>Event Peserta</h3>
    </div>

    <div class="menu" onclick="location.href='monitoring.html'">
        📈
        <h3>Monitoring</h3>
    </div>

    <div class="menu" onclick="location.href='report.html'">
        📄
        <h3>Report</h3>
    </div>

</div>

</div>

</div>

<script>

function logout(){

localStorage.clear();

location.href="index.html";

}

</script>

</body>
</html>
