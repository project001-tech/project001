<div class="card">

<h2>

LOGIN PESERTA

</h2>

<label>Email</label>

<input
type="email"
id="email">

<label>Password</label>

<input
type="password"
id="password">

<button onclick="login()">

LOGIN

</button>

<div id="error"></div>

</div>

<script>

/*==========================================
LOGIN PESERTA
==========================================*/

async function login(){

    const email = document.getElementById("email").value.trim();

    const password = document.getElementById("password").value.trim();

    document.getElementById("error").innerHTML="";

    if(email=="" || password==""){

        document.getElementById("error").innerHTML="Email dan Password wajib diisi";

        return;

    }

    const {data,error}=await db

    .from("participants")

    .select("*")

    .eq("email",email)

    .eq("password",password)

    const {data,error}=await db

.from("participants")

.select("*")

.eq("email",email)

.eq("password",password)

.single();

    .single();

    if(error || !data){

        document.getElementById("error").innerHTML="Email atau Password salah";

        return;

    }

    /*=========================
      SIMPAN SESSION
    =========================*/

    localStorage.setItem(

        "rfs_user",

        JSON.stringify(data)

    );

    /*=========================
      CATAT ACTIVITY LOG
    =========================*/

    await db

    .from("activity_log")

    .insert({

        user_id:data.id,

        user_type:"PESERTA",

        aktivitas:"LOGIN PESERTA",

        participant_id:data.id,

        created_at:new Date()

    });

    /*=========================
      MASUK DASHBOARD PESERTA
    =========================*/

    location.href="peserta.html";

}


/*==========================================
ENTER = LOGIN
==========================================*/

document.addEventListener("keypress",function(e){

    if(e.key=="Enter"){

        login();

    }

});

</script>
