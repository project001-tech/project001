<style>

<body>

<header>

<div>

<button
onclick="location.href='master_event.html'">

← Master Event

</button>

</div>

<h2>

Kelola Tahapan Event

</h2>

<div id="namaEvent">

...

</div>

</header>

<div class="container">

<table>

<thead>

<tr>

<th>No</th>

<th>Tahapan</th>

<th>Soal</th>

<th>Petunjuk</th>

<th>Download</th>

<th>Upload</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>

<script>

const params=new URLSearchParams(location.search);

const eventId=params.get("id");

loadEvent();

async function loadEvent(){

const {data,error}=await db

.from("events")

.select("*")

.eq("id",eventId)

.single();

if(error){

alert(error.message);

return;

}

document.getElementById("namaEvent").innerHTML=

data.nama_event;

loadTahapan();

}

async function loadTahapan(){

const {data,error}=await db

.from("event_tests")

.select(`
    *,
    tests (
        id,
        nama_test
    )
`)

.eq("event_id",eventId)

.order("urutan");

if(error){

    alert(error.message);

    return;

}

renderTahapan(data);

}

function renderTahapan(data){

const tbody=document.getElementById("tbody");

tbody.innerHTML="";

data.forEach((r,index)=>{

tbody.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${r.tests.nama_test}</td>

<td>

${r.soal_file ??

"<span style='color:red'>Belum Upload</span>"}

</td>

<td>

${r.petunjuk
?
"✔ Ada"
:
"<span style='color:red'>Belum</span>"
}

</td>

<td>

${r.buka_download
?
new Date(r.buka_download).toLocaleString("id-ID")
:
"-"
}

</td>

<td>

${r.tutup_upload
?
new Date(r.tutup_upload).toLocaleString("id-ID")
:
"-"
}

</td>

<td>

<button
onclick="editTahapan('${r.id}')">

Kelola

</button>

</td>

</tr>

`;

});

}

async function editTahapan(id){

const {data,error}=await db

.from("event_tests")

.select("*")

.eq("id",id)

.single();

if(error){

    alert(error.message);

    return;

}

document.getElementById("et_id").value=data.id;

document.getElementById("et_petunjuk").value=data.petunjuk||"";

document.getElementById("et_download").value=

data.buka_download?

data.buka_download.substring(0,16):"";

document.getElementById("et_upload").value=

data.tutup_upload?

data.tutup_upload.substring(0,16):"";

document.getElementById("popup").style.display="flex";

}
</script>
<div id="popup"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;">

<div
style="
background:white;
width:600px;
padding:20px;
border-radius:10px;">

<h3>Kelola Tahapan</h3>

<input
type="hidden"
id="et_id">

<label>Petunjuk</label>

<textarea
id="et_petunjuk"
rows="5"></textarea>

<br><br>

<label>Buka Download</label>

<input
type="datetime-local"
id="et_download">

<br><br>

<label>Tutup Upload</label>

<input
type="datetime-local"
id="et_upload">

<br><br>

<label>Upload Soal</label>

<input
type="file"
id="fileSoal">

<br><br>

<button
onclick="simpanTahapan()">

Simpan

</button>

<button
onclick="document.getElementById('popup').style.display='none'">

Tutup

</button>

</div>

</div>

<script>

async function simpanTahapan(){

const id=document.getElementById("et_id").value;

const obj={

    petunjuk:document.getElementById("et_petunjuk").value,

    buka_download:
    document.getElementById("et_download").value==""?
    null:
    document.getElementById("et_download").value,

    tutup_upload:
    document.getElementById("et_upload").value==""?
    null:
    document.getElementById("et_upload").value

};

const {error}=await db

.from("event_tests")

.update(obj)

.eq("id",id);

if(error){

    alert(error.message);

    return;

}

document.getElementById("popup").style.display="none";

loadTahapan();

alert("Data berhasil disimpan");

}

</script>

</body>
