<script>

const params=new URLSearchParams(location.search);

const eventId=params.get("id");

loadEvent();

async function loadEvent(){

const {data,error}=await db

.from("events")

.select("*")

.eq("id",eventId)

.single();

if(error){

alert(error.message);

return;

}

data.nama_event;

}
