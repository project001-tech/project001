<body>

<header>

class="backBtn"
onclick="location.href='dashboard.html'">

<div>

Recruitment Flow System

<div class="container">

<div class="card">

<h3>

Pilih Event Recruitment

</h3>

<select id="eventSelect">

<option value="">

Memuat Event...

</option>

</select>

</div>

<div class="card">

<h3>

Daftar Peserta

</h3>

<input
class="search"
id="txtCari"
placeholder="Cari peserta..."

<div
class="list"
id="listPeserta">

<div
style="padding:20px;text-align:center;">

Memuat peserta...

</div>

</div>

<div class="stat">

<h2 id="dipilih">

0

</h2>

<div>

Dipilih

</div>

</div>

<h2 id="totalTahapan">

0

</h2>

<div>

Tahapan Event

</div>

</div>

class="primary"

💾 Simpan Peserta ke Event

</button>

Menunggu proses...

</div>

<script>

<script>

let semuaPeserta=[];
let semuaEvent=[];
let semuaTahapan=[];

/*====================================
START
====================================*/

window.onload=async()=>{

    await loadEvent();

    await loadPeserta();

}

/*====================================
LOAD EVENT
====================================*/

async function loadEvent(){

    const {data,error}=await db

    .from("events")

    .select("*")

    .order("nama_event");

    if(error){

        alert(error.message);

        return;

    }

    semuaEvent=data||[];

    const cmb=document.getElementById("eventSelect");

    cmb.innerHTML="<option value=''>-- Pilih Event --</option>";

    semuaEvent.forEach(e=>{

        cmb.innerHTML+=`

        <option value="${e.id}">

            ${e.nama_event}

        </option>

        `;

    });

    cmb.onchange=pilihEvent;

}

/*====================================
LOAD PESERTA
====================================*/

async function loadPeserta(){

    const {data,error}=await db

    .from("participants")

    .select("*")

    .order("nama");

    if(error){

        alert(error.message);

        return;

    }

    semuaPeserta=data||[];

    renderPeserta();

}

/*====================================
RENDER PESERTA
====================================*/

function renderPeserta(){

    const list=document.getElementById("listPeserta");

    list.innerHTML="";

    semuaPeserta.forEach(p=>{

        list.innerHTML+=`

        <div class="item">

            <input

            type="checkbox"

            class="chkPeserta"

            value="${p.id}"

            ${p.event_id ? "checked":""}

            >

            <div>

                <b>${p.nama}</b>

                <br>

                ${p.email}

            </div>

        </div>

        `;

    });

    document.getElementById("totalPeserta").innerHTML=

    semuaPeserta.length;

    hitungDipilih();

}

/*====================================
FILTER
====================================*/

function filterPeserta(){

    const cari=document.getElementById("txtCari")

    .value.toLowerCase();

    const item=document.querySelectorAll(".item");

    item.forEach(i=>{

        if(i.innerText.toLowerCase().includes(cari))

            i.style.display="flex";

        else

            i.style.display="none";

    });

}

/*====================================
HITUNG YANG DIPILIH
====================================*/

function hitungDipilih(){

    document.getElementById("dipilih").innerHTML=

    document.querySelectorAll(".chkPeserta:checked").length;

}

document.addEventListener("change",(e)=>{

    if(e.target.classList.contains("chkPeserta"))

        hitungDipilih();

});

/*====================================
PILIH EVENT
====================================*/

async function pilihEvent(){

    const eventId=this.value;

    if(eventId==""){

        document.getElementById("totalTahapan").innerHTML="0";

        return;

    }

    const {data,error}=await db

    .from("event_tests")

    .select("*")

    .eq("event_id",eventId);

    if(error){

        alert(error.message);

        return;

    }

    semuaTahapan=data||[];

    document.getElementById("totalTahapan").innerHTML=

    semuaTahapan.length;

}

<!-- ====================================
SIMPAN PESERTA KE EVENT
==================================== -->

<script>

async function simpanPeserta(){

    const eventId=document.getElementById("eventSelect").value;

    if(eventId==""){

        alert("Pilih Event terlebih dahulu.");

        return;

    }

    const pesertaDipilih=[
        ...document.querySelectorAll(".chkPeserta:checked")
    ].map(x=>x.value);

    if(pesertaDipilih.length==0){

        alert("Belum ada peserta yang dipilih.");

        return;

    }

    const log=document.getElementById("progressBox");

    log.innerHTML="Memulai proses...\n";

    /*====================================
    UPDATE EVENT PESERTA
    ====================================*/

    for(const pesertaId of pesertaDipilih){

        log.innerHTML+="Assign peserta "+pesertaId+" ...<br>";

        const {error:updateError}=await db

        .from("participants")

        .update({

            event_id:eventId

        })

        .eq("id",pesertaId);

        if(updateError){

            log.innerHTML+="❌ "+updateError.message+"<br>";

            continue;

        }

    }

    log.innerHTML+="<br>✔ Event peserta berhasil disimpan.<br><br>";

    /*====================================
    AMBIL TAHAPAN EVENT
    ====================================*/

    const {data:tahapan,error:tError}=await db

    .from("event_tests")

    .select("*")

    .eq("event_id",eventId)

    .order("urutan");

    if(tError){

        alert(tError.message);

        return;

    }

    let insertBerhasil=0;

    let skip=0;

    /*====================================
    GENERATE PROGRESS
    ====================================*/

    for(const pesertaId of pesertaDipilih){

        for(const t of tahapan){

            const cek=await db

            .from("progress")

            .select("id")

            .eq("participant_id",pesertaId)

            .eq("event_id",eventId)

            .eq("test_id",t.test_id);

            if(cek.data.length>0){

                skip++;

                continue;

            }

            const simpan=await db

            .from("progress")

            .insert({

                participant_id:pesertaId,

                event_id:eventId,

                test_id:t.test_id,

                status:"BELUM",

                download_count:0,

                upload_count:0

            });

            if(simpan.error){

                log.innerHTML+="❌ "+simpan.error.message+"<br>";

            }else{

                insertBerhasil++;

            }

        }

    }

    log.innerHTML+="<hr>";

    log.innerHTML+="✔ Progress dibuat : "+insertBerhasil+" record<br>";

    log.innerHTML+="✔ Sudah ada : "+skip+" record<br>";

    log.innerHTML+="<br>";

    log.innerHTML+="SELESAI";

    alert("Generate Progress selesai.");

}

</script>

</script>

</script>
