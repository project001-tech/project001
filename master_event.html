<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#f5f7fb}

<body>

 <header class="topbar">

    <button class="backBtn"
        onclick="location.href='dashboard.html'">

        ← Dashboard

    </button>

    <h2>Master Event</h2>

    <div id="namaAdmin">

        Administrator

    </div>

</header>

<div class="container">

<div class="toolbar">
<input id="txtCari" placeholder="Cari Event..." onkeyup="loadEvents()">
<button onclick="baru()">+ Event</button>
</div>

<table>
<thead>
<tr>
<th>Nama Event</th>
<th>Periode</th>
<th>Status</th>
<th>Tahapan</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<div id="modal">
<div class="box">

<h3 id="judul">Tambah Event</h3>

<input type="hidden" id="eid">

<label>Nama Event</label>
<input id="nama">

<label>Periode</label>
<input id="periode" placeholder="Contoh : Juli 2026">

<label>Tahapan</label>
<div id="daftarTahapan" class="list"></div>

<br>

<button onclick="simpan()">Simpan</button>
<button onclick="tutup()">Batal</button>

</div>
</div>

<script>
let semuaTahapan=[];

async function loadTahapan(){
 const {data}=await db.from("tests").select("*").eq("aktif",true).order("urutan");
 semuaTahapan=data||[];
 renderTahapan([]);
}

function renderTahapan(selected){
 daftarTahapan.innerHTML="";
 semuaTahapan.forEach(t=>{
   daftarTahapan.innerHTML+=`
   <div class="item">
   <label>
   <input type="checkbox" value="${t.id}" ${selected.includes(String(t.id))?"checked":""}>
   ${t.urutan}. ${t.nama_test}
   </label>
   </div>`;
 });
}

async function loadEvents(){

 const {data,error}=await db.from("events").select("*").order("created_at",{ascending:false});
 if(error){alert(error.message);return;}

 const cari=txtCari.value.toLowerCase();
 tbody.innerHTML="";

 (data||[])
 .filter(e=>(e.nama_event||"").toLowerCase().includes(cari))
 .forEach(e=>{

 tbody.innerHTML+=`
 <tr>
 <td>${e.nama_event}</td>
 <td>${e.periode||""}</td>
 <td>${e.status||"Aktif"}</td>
 <td>${(e.event_tests||[]).length}</td>
 <td>
 <button onclick="edit('${e.id}')">✏ Edit</button>

<button onclick="kelolaSoal('${e.id}')">
📁 Soal
</button>

<button onclick="uploadSoal('${e.id}')">
📁 Soal
</button>
 </td>
 </tr>`;

 });

}

let eventUpload=null;

 function kelolaSoal(eventId){

    location.href=
    "event_tahapan.html?id="+eventId;

}

async function uploadSoal(id){

    eventUpload=id;

    const {data}=await db

    .from("events")
.select(`
    *,
    event_tests(
        id
    )
`)

    .eq("id",id)

    .single();

    renderUpload(data);

    modalUpload.style.display="flex";

}

function renderUpload(event){

    listUpload.innerHTML="";

    semuaTahapan.forEach(t=>{

        listUpload.innerHTML+=`

        <div style="margin-bottom:15px">

        <b>${t.nama_test}</b>

        <br>

        <input
        type="file"
        onchange="prosesUpload(event,'${t.id}')">

        </div>

        `;

    });

}

function baru(){
document.getElementById("eid").value="";
document.getElementById("nama").value="";
document.getElementById("periode").value="";
 renderTahapan([]);
 modal.style.display="flex";
}

function tutup(){
 modal.style.display="none";
}

async function edit(id){

    const {data,error}=await db

    .from("events")

    .select(`
        *,
        event_tests(
            test_id
        )
    `)

    .eq("id",id)

    .single();

    if(error){

        alert(error.message);

        return;

    }

    document.getElementById("eid").value=data.id;

    document.getElementById("nama").value=data.nama_event;

    document.getElementById("periode").value=data.periode||"";

    const selected=

    (data.event_tests||[])

    .map(x=>String(x.test_id));

    renderTahapan(selected);

    modal.style.display="flex";

}

async function simpan(){

    const namaEvent = document.getElementById("nama").value.trim();

    if(namaEvent==""){

        alert("Nama Event wajib diisi");

        return;

    }

    const periode = document.getElementById("periode").value;

    const tahapanDipilih =
    [...document.querySelectorAll("#daftarTahapan input:checked")];

    if(tahapanDipilih.length==0){

        alert("Pilih minimal satu tahapan.");

        return;

    }

    const obj={

        nama_event:namaEvent,

        periode:periode,

        status:"Aktif"

    };

    let eventId=null;

    if(document.getElementById("eid").value==""){

        const {data,error}=await db

        .from("events")

        .insert(obj)

        .select()

        .single();

        if(error){

            alert(error.message);

            return;

        }

        eventId=data.id;

    }else{

        eventId=document.getElementById("eid").value;

        const {error}=await db

        .from("events")

        .update(obj)

        .eq("id",eventId);

        if(error){

            alert(error.message);

            return;

        }

    }

    await simpanTahapan(eventId,tahapanDipilih);

}

async function simpanTahapan(eventId,tahapanDipilih){

    await db

    .from("event_tests")

    .delete()

    .eq("event_id",eventId);

    const rows=[];

    tahapanDipilih.forEach((item,index)=>{

        rows.push({

            event_id:eventId,

            test_id:Number(item.value),

            urutan:index+1

        });

    });

    const {error}=await db

    .from("event_tests")

    .insert(rows);

    if(error){

        alert(error.message);

        return;

    }

    alert("Event berhasil disimpan.");

    tutup();

    loadEvents();

}

loadTahapan();
loadEvents();
</script>
<div id="modalUpload" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);justify-content:center;align-items:center;">
