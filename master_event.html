<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#f5f7fb}
header{background:#2563eb;color:#fff;padding:16px 20px;font-size:20px;font-weight:bold}
.container{padding:20px}

 .topbar{

    background:white;

    color:#2563eb;

<body>

 <header class="topbar">

    <button class="backBtn"
        onclick="location.href='dashboard.html'">

        ← Dashboard

    </button>

    <h2>Master Event</h2>

    <div id="namaAdmin">

        Administrator

    </div>

</header>

<div class="container">

<div class="toolbar">
<input id="txtCari" placeholder="Cari Event..." onkeyup="loadEvents()">
<button onclick="baru()">+ Event</button>
</div>

<table>
<thead>
<tr>
<th>Nama Event</th>
<th>Periode</th>
<th>Status</th>
<th>Tahapan</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<div id="modal">
<div class="box">

<h3 id="judul">Tambah Event</h3>

<input type="hidden" id="eid">

<label>Nama Event</label>
<input id="nama">

<label>Periode</label>
<input id="periode" placeholder="Contoh : Juli 2026">

<label>Tahapan</label>
<div id="daftarTahapan" class="list"></div>

<br>

<button onclick="simpan()">Simpan</button>
<button onclick="tutup()">Batal</button>

</div>
</div>

<script>
let semuaTahapan=[];

async function loadTahapan(){
 const {data}=await db.from("tests").select("*").eq("aktif",true).order("urutan");
 semuaTahapan=data||[];
 renderTahapan([]);
}

function renderTahapan(selected){
 daftarTahapan.innerHTML="";
 semuaTahapan.forEach(t=>{
   daftarTahapan.innerHTML+=`
   <div class="item">
   <label>
   <input type="checkbox" value="${t.id}" ${selected.includes(String(t.id))?"checked":""}>
   ${t.urutan}. ${t.nama_test}
   </label>
   </div>`;
 });
}

async function loadEvents(){

 const {data,error}=await db.from("events").select("*").order("created_at",{ascending:false});
 if(error){alert(error.message);return;}

 const cari=txtCari.value.toLowerCase();
 tbody.innerHTML="";

 (data||[])
 .filter(e=>(e.nama_event||"").toLowerCase().includes(cari))
 .forEach(e=>{

 tbody.innerHTML+=`
 <tr>
 <td>${e.nama_event}</td>
 <td>${e.periode||""}</td>
 <td>${e.status||"Aktif"}</td>
 <td>${(e.tahapan||[]).length}</td>
 <td>
 <button onclick="edit('${e.id}')">
✏ Edit
</button>

<button onclick="uploadSoal('${e.id}')">
📁 Soal
</button>
 </td>
 </tr>`;

 });

}

let eventUpload=null;

async function uploadSoal(id){

    eventUpload=id;

    const {data}=await db

    .from("events")

    .select("*")

    .eq("id",id)

    .single();

    renderUpload(data);

    modalUpload.style.display="flex";

}

function renderUpload(event){

    listUpload.innerHTML="";

    semuaTahapan.forEach(t=>{

        listUpload.innerHTML+=`

        <div style="margin-bottom:15px">

        <b>${t.nama_test}</b>

        <br>

        <input
        type="file"
        onchange="prosesUpload(event,'${t.id}')">

        </div>

        `;

    });

}

function baru(){
document.getElementById("eid").value="";
document.getElementById("nama").value="";
document.getElementById("periode").value="";
 renderTahapan([]);
 modal.style.display="flex";
}

function tutup(){
 modal.style.display="none";
}

async function edit(id){

 const {data}=await db.from("events").select("*").eq("id",id).single();

 eid.value=data.id;
 nama.value=data.nama_event;
 periode.value=data.periode||"";
 renderTahapan((data.tahapan||[]).map(String));

 modal.style.display="flex";

}

async function simpan(){

 const tahapan=[...daftarTahapan.querySelectorAll("input:checked")].map(x=>x.value);

 const obj={
 nama_event:nama.value,
 periode:periode.value,
 status:"Aktif",
 tahapan:tahapan
 };

 let res;

 if(eid.value){
   res=await db.from("events").update(obj).eq("id",eid.value);
 }else{
   res=await db.from("events").insert(obj);
 }

 if(res.error){alert(res.error.message);return;}

 tutup();
 loadEvents();

}

loadTahapan();
loadEvents();
</script>
<div id="modalUpload" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);justify-content:center;align-items:center;">

<div class="box">

<h3>Upload Soal Event</h3>

<div id="listUpload"></div>

<br>

<button onclick="tutupUpload()">

Tutup

</button>

</div>

</div>
</body>
</html>
