<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#f5f7fb}
header{background:#2563eb;color:#fff;padding:16px 20px;font-size:20px;font-weight:bold}
.container{padding:20px}
.toolbar{display:flex;justify-content:space-between;gap:10px;margin-bottom:15px}
input,select{padding:10px;border:1px solid #ccc;border-radius:6px;width:100%}
button{padding:10px 15px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:10px}
th{background:#eef3ff}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center}
.box{background:#fff;width:520px;padding:20px;border-radius:10px}

.topbar{

    height:65px;

    background:#2563eb;

    color:white;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 20px;

}

.backBtn{

    background:white;

    color:#2563eb;

    border:none;

    padding:8px 16px;

    border-radius:6px;

    cursor:pointer;

    font-weight:bold;

}

.backBtn:hover{

    background:#e5e7eb;

}

<body>

<header class="topbar">

    <button class="backBtn"
        onclick="location.href='dashboard.html'">

        ← Dashboard

    </button>

    <h2>Master Tahapan</h2>

    <div id="namaAdmin">

        Administrator

    </div>

</header>
<header>Master Peserta</header>

<div class="container">

<div class="toolbar">
<input id="txtCari" placeholder="Cari Peserta..." onkeyup="loadPeserta()">
<button onclick="baru()">+ Tambah Peserta</button>
</div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Email</th>
<th>Event</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<div id="modal">
<div class="box">

<h3>Peserta</h3>

<input type="hidden" id="pid">

<label>Nama</label>
<input id="nama">

<label>Email</label>
<input id="email">

<label>Password</label>
<input id="password" value="123456">

<label>Event</label>
<select id="event"></select>

<label>Status</label>
<select id="status">
<option value="Aktif">Aktif</option>
<option value="Non Aktif">Non Aktif</option>
</select>

<br><br>

<button onclick="simpan()">Simpan</button>
<button onclick="tutup()">Batal</button>

</div>
</div>

<script>
async function loadEvent(){
 const {data}=await db.from("events").select("id,nama_event").order("nama_event");
 event.innerHTML="";
 (data||[]).forEach(e=>{
   event.innerHTML+=`<option value="${e.id}">${e.nama_event}</option>`;
 });
}

async function loadPeserta(){
 const {data,error}=await db.from("participants").select("*").order("nama");
 if(error){alert(error.message);return;}

 const cari=txtCari.value.toLowerCase();
 tbody.innerHTML="";

 (data||[])
 .filter(x=>(x.nama||"").toLowerCase().includes(cari))
 .forEach(r=>{
   tbody.innerHTML+=`
   <tr>
   <td>${r.nama||""}</td>
   <td>${r.email||""}</td>
   <td>${r.event_id||""}</td>
   <td>${r.status||"Aktif"}</td>
   <td><button onclick="edit('${r.id}')">Edit</button></td>
   </tr>`;
 });

}

function baru(){
 pid.value="";
 nama.value="";
 email.value="";
 password.value="123456";
 status.value="Aktif";
 modal.style.display="flex";
}

function tutup(){modal.style.display="none";}

async function edit(id){
 const {data}=await db.from("participants").select("*").eq("id",id).single();
 pid.value=data.id;
 nama.value=data.nama||"";
 email.value=data.email||"";
 password.value=data.password||"";
 event.value=data.event_id||"";
 status.value=data.status||"Aktif";
 modal.style.display="flex";
}
function generateToken(){

    return Math.random()

    .toString(36)

    .substring(2,12)

    .toUpperCase();

}
async function simpan(){

const obj={

    nama:nama.value,

    email:email.value,

    password:password.value,

    event_id:event.value

};

if(pid.value==""){

    obj.invite_token=generateToken();

}

 let res;

 if(pid.value){
   res=await db.from("participants").update(obj).eq("id",pid.value);
 }else{
   res=await db.from("participants").insert(obj);
 }

 if(res.error){
   alert(res.error.message);
   return;
 }

 tutup();
 loadPeserta();

}

loadEvent();
loadPeserta();
</script>

</body>
</html>
